<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons>
      <ion-title slot="start">{{myStudentNumber}}</ion-title>
      <ion-button slot="end" (click)="openFavourites()">
        <ion-icon name="heart" class="icons"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-item>
    <ion-input
      label="Search"
      placeholder="Enter a Movie Name"
      [(ngModel)]="keyword"
    ></ion-input>
  </ion-item>
  <ion-button fill="outline" expand="block" shape="round" (click)="getMovies()">SEARCH</ion-button>

  <h4 class="titleSize">{{titleTM}}</h4>

  <div class="chessboard">
  <ion-card
    (click)="openMovieDetailsPage(movie)"
    *ngFor="let movie of trendingMovies"
  >
    <img
      class="posterSize"
      [src]="posterURL + movie.poster_path"
      alt="Movie Poster"
      onerror="this.onerror=null;this.src='https://ionicframework.com/docs/img/demos/card-media.png';"
    />
    <!--in case there's no photo, I used the ionic image which I know is available-->
    <ion-card-content> {{movie.overview}} </ion-card-content>
  </ion-card>
</div>
</ion-content>
